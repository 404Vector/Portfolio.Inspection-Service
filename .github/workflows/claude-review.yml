name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  claude-review:
    name: Claude Code Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git fetch origin main
          git diff origin/main...HEAD > pr_diff.txt
          echo "Changed lines: $(wc -l < pr_diff.txt)"

      - name: Review with Claude
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, sys

          with open('pr_diff.txt') as f:
              diff = f.read()

          if not diff.strip():
              result = {"approved": True, "body": "No code changes detected — automatically approved."}
              with open('review.json', 'w') as f:
                  json.dump(result, f)
              sys.exit(0)

          # Truncate large diffs to stay within token limits
          if len(diff) > 60000:
              diff = diff[:60000] + "\n\n[diff truncated — remaining changes not shown]"

          prompt = f"""You are a senior code reviewer. Review the following git diff carefully and produce structured feedback.

Evaluate each item below and mark it as ✅ PASS or ❌ FAIL with a brief reason:

- Correctness: Logic is sound, no obvious bugs
- Security: No injection, auth bypass, secrets in code, or other OWASP Top 10 issues
- Performance: No unnecessary N+1 queries, blocking calls, or memory issues
- Maintainability: Code is readable, follows existing patterns, no dead code
- Test coverage: New functionality has corresponding tests
- Breaking changes: No unintended breaking changes to APIs or contracts

Then provide:
1. A summary of any issues found
2. A final verdict of exactly one of: APPROVED or CHANGES_REQUESTED

Use this exact format:

## Checklist

- ✅/❌ **Correctness** — <reason>
- ✅/❌ **Security** — <reason>
- ✅/❌ **Performance** — <reason>
- ✅/❌ **Maintainability** — <reason>
- ✅/❌ **Test coverage** — <reason>
- ✅/❌ **Breaking changes** — <reason>

## Comments

<detailed feedback, or "No issues found." if all items pass>

## Verdict

APPROVED or CHANGES_REQUESTED

---
Git diff:

{diff}
"""

          payload = json.dumps({
              "model": "claude-sonnet-4-6",
              "max_tokens": 4096,
              "messages": [{"role": "user", "content": prompt}]
          }).encode()

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=payload,
              headers={
                  "Content-Type": "application/json",
                  "x-api-key": os.environ["ANTHROPIC_API_KEY"],
                  "anthropic-version": "2023-06-01",
              }
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read())
                  review_text = data["content"][0]["text"]
          except Exception as e:
              print(f"Claude API error: {e}", file=sys.stderr)
              sys.exit(1)

          approved = (
              "APPROVED" in review_text
              and "CHANGES_REQUESTED" not in review_text
          )

          icon = "✅" if approved else "❌"
          verdict_label = "Approved" if approved else "Changes Requested"

          body = (
              f"## {icon} Claude Code Review — {verdict_label}\n\n"
              + review_text
              + "\n\n---\n*Automated review by Claude AI*"
          )

          result = {"approved": approved, "body": body}
          with open('review.json', 'w') as f:
              json.dump(result, f)

          print(f"Verdict: {verdict_label}")
          PYEOF

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { approved, body } = JSON.parse(fs.readFileSync('review.json', 'utf8'));

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

      - name: Set commit status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let approved = false;
            try {
              ({ approved } = JSON.parse(fs.readFileSync('review.json', 'utf8')));
            } catch (_) {}

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: approved ? 'success' : 'failure',
              context: 'Claude Code Review',
              description: approved
                ? 'All checklist items passed'
                : 'Review requested changes — see PR comment',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/pull/${context.payload.pull_request.number}`,
            });

            if (!approved) {
              core.setFailed('Claude Code Review requested changes. Merge is blocked.');
            }
