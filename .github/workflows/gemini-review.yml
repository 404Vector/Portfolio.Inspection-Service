name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  gemini-review:
    name: Gemini Code Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git fetch origin main
          git diff origin/main...HEAD > pr_diff.txt
          echo "Changed lines: $(wc -l < pr_diff.txt)"

      - name: Review with Gemini
        id: review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 .github/scripts/gemini_review.py

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { approved, body } = JSON.parse(fs.readFileSync('review.json', 'utf8'));

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

      - name: Set commit status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let approved = false;
            try {
              ({ approved } = JSON.parse(fs.readFileSync('review.json', 'utf8')));
            } catch (_) {}

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: approved ? 'success' : 'failure',
              context: 'Gemini Code Review',
              description: approved
                ? 'All checklist items passed'
                : 'Review requested changes — see PR comment',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/pull/${context.payload.pull_request.number}`,
            });

            if (!approved) {
              core.setFailed('Gemini Code Review requested changes. Merge is blocked.');
            }
