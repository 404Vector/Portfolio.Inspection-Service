syntax = "proto3";

option csharp_namespace = "Core.Grpc.Inspection";

package inspection;

// ── Service ──────────────────────────────────────────────────────────────────

service WaferInspection {
  // 단일 프레임 즉시 검사 (Unary)
  rpc InspectFrame        (InspectFrameRequest)       returns (InspectFrameResponse);

  // 연속 시퀀스 잡 제어
  rpc StartInspectionJob  (StartInspectionJobRequest) returns (StartInspectionJobResponse);
  rpc StopInspectionJob   (StopInspectionJobRequest)  returns (StopInspectionJobResponse);

  // 잡 결과 조회 (완료 후 클라이언트 요청)
  rpc GetJobSummary       (GetJobSummaryRequest)      returns (JobSummaryResponse);
  rpc GetJobResults       (GetJobResultsRequest)      returns (JobResultsResponse);

  // 실시간 프레임별 결과 스트림 (클라이언트 모니터링용)
  rpc SubscribeJobEvents  (SubscribeJobEventsRequest) returns (stream JobFrameEvent);

  // 서비스 상태 조회
  rpc GetStatus           (GetStatusRequest)          returns (InspectionStatusResponse);
}

// ── Enums ─────────────────────────────────────────────────────────────────────

enum InspectionResult {
  INSPECTION_RESULT_UNSPECIFIED = 0;
  INSPECTION_RESULT_PASS        = 1;
  INSPECTION_RESULT_FAIL        = 2;
  INSPECTION_RESULT_ERROR       = 3;
}

enum InspectionServiceState {
  INSPECTION_SERVICE_STATE_UNSPECIFIED = 0;
  INSPECTION_SERVICE_STATE_IDLE        = 1;
  INSPECTION_SERVICE_STATE_RUNNING     = 2;
  INSPECTION_SERVICE_STATE_ERROR       = 3;
}

// ── Recipe messages ───────────────────────────────────────────────────────────

// InspectionRecipe.Models.SingleInspectionRecipe 의 proto 표현.
message SingleInspectionRecipeProto {
  string recipe_name    = 1;
  string description    = 2;
  int32  frame_width    = 3;
  int64  timestamp_us   = 4;
  float  threshold      = 5;
  double confidence_min = 6;
  bool   save_on_fail   = 7;
  string algorithm_tag  = 8;
  bytes  roi_mask       = 9;
}

// InspectionRecipe.Models.JobInspectionRecipe 의 proto 표현.
message JobInspectionRecipeProto {
  string recipe_name        = 1;
  string description        = 2;
  int32  max_frame_count    = 3;
  int64  job_timeout_us     = 4;
  float  reject_threshold   = 5;
  double min_pass_rate      = 6;
  bool   stop_on_first_fail = 7;
  string job_tag            = 8;
  bytes  wafer_map          = 9;
}

// ── Requests / Responses ──────────────────────────────────────────────────────

message InspectFrameRequest {
  string                      frame_id = 1;
  SingleInspectionRecipeProto recipe   = 2;
}

message InspectFrameResponse {
  string           frame_id        = 1;
  InspectionResult result          = 2;
  double           confidence      = 3;
  int64            inspected_at_us = 4;
  string           message         = 5;
}

message StartInspectionJobRequest {
  string                   job_id = 1;
  JobInspectionRecipeProto recipe = 2;
}

message StartInspectionJobResponse {
  bool   success = 1;
  string message = 2;
}

message StopInspectionJobRequest {
  string job_id = 1;
}

message StopInspectionJobResponse {
  bool   success = 1;
  string message = 2;
}

message GetJobSummaryRequest {
  string job_id = 1;
}

message JobSummaryResponse {
  string           job_id         = 1;
  int32            total_frames   = 2;
  int32            pass_count     = 3;
  int32            fail_count     = 4;
  int32            error_count    = 5;
  double           pass_rate      = 6;
  int64            started_at_us  = 7;
  int64            finished_at_us = 8;
  InspectionResult overall_result = 9;
}

message GetJobResultsRequest {
  string job_id    = 1;
  int32  page      = 2;  // 0-based
  int32  page_size = 3;
}

message JobResultsResponse {
  string                   job_id      = 1;
  repeated FrameResultItem results     = 2;
  int32                    total_count = 3;
  int32                    page        = 4;
  int32                    page_size   = 5;
}

message FrameResultItem {
  string           frame_id        = 1;
  InspectionResult result          = 2;
  double           confidence      = 3;
  int64            inspected_at_us = 4;
}

message SubscribeJobEventsRequest {
  string job_id = 1;
}

message JobFrameEvent {
  string           job_id          = 1;
  string           frame_id        = 2;
  InspectionResult result          = 3;
  double           confidence      = 4;
  int64            inspected_at_us = 5;
  int32            frame_index     = 6;
}

message GetStatusRequest {}

message InspectionStatusResponse {
  InspectionServiceState state         = 1;
  string                 active_job_id = 2;
  int64                  frames_done   = 3;
  string                 message       = 4;
}
