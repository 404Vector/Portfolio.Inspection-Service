syntax = "proto3";

option csharp_namespace = "FrameGrabberService.Grpc";

package framegrabber;

service FrameGrabber {
  rpc Configure         (ConfigureRequest)        returns (ConfigureResponse);
  rpc StartAcquisition  (StartAcquisitionRequest) returns (StartAcquisitionResponse);
  rpc StopAcquisition   (StopAcquisitionRequest)  returns (StopAcquisitionResponse);
  rpc TriggerFrame      (TriggerFrameRequest)     returns (FrameHandle);
  rpc SubscribeFrames   (SubscribeFramesRequest)  returns (stream FrameHandle);
  rpc GetStatus         (GetStatusRequest)        returns (StatusResponse);

  // ── 동적 파라미터 / 명령 ─────────────────────────────────────────────────
  rpc GetCapabilities   (GetCapabilitiesRequest)  returns (CapabilitiesResponse);
  rpc GetParameter      (GetParameterRequest)     returns (GetParameterResponse);
  rpc SetParameter      (SetParameterRequest)     returns (SetParameterResponse);
  rpc ExecuteCommand    (ExecuteCommandRequest)   returns (CommandResult);
}

// ── Enums ────────────────────────────────────────────────────────────────────

enum AcquisitionMode {
  ACQUISITION_MODE_UNSPECIFIED = 0;
  ACQUISITION_MODE_CONTINUOUS  = 1;
  ACQUISITION_MODE_TRIGGERED   = 2;
}

enum PixelFormat {
  PIXEL_FORMAT_UNSPECIFIED = 0;
  PIXEL_FORMAT_MONO8       = 1;
  PIXEL_FORMAT_RGB8        = 2;
  PIXEL_FORMAT_BGR8        = 3;
}

enum GrabberState {
  GRABBER_STATE_UNSPECIFIED = 0;
  GRABBER_STATE_IDLE        = 1;
  GRABBER_STATE_ACQUIRING   = 2;
  GRABBER_STATE_ERROR       = 3;
}

enum ParameterValueType {
  PARAMETER_VALUE_TYPE_UNSPECIFIED = 0;
  PARAMETER_VALUE_TYPE_INT64       = 1;
  PARAMETER_VALUE_TYPE_DOUBLE      = 2;
  PARAMETER_VALUE_TYPE_BOOL        = 3;
  PARAMETER_VALUE_TYPE_STRING      = 4;
}

// ── Common value type ─────────────────────────────────────────────────────────

message ParameterValue {
  oneof value {
    int64  int_val    = 1;
    double double_val = 2;
    bool   bool_val   = 3;
    string string_val = 4;
  }
}

// ── Requests / Responses ─────────────────────────────────────────────────────

message ConfigureRequest {
  AcquisitionMode mode          = 1;
  PixelFormat     pixel_format  = 2;
  int32           width         = 3;
  int32           height        = 4;
  double          frame_rate_hz = 5;
}
message ConfigureResponse {
  bool   success = 1;
  string message = 2;
}

message StartAcquisitionRequest {}
message StartAcquisitionResponse {
  bool   success = 1;
  string message = 2;
}

message StopAcquisitionRequest {}
message StopAcquisitionResponse {
  bool   success = 1;
  string message = 2;
}

message TriggerFrameRequest {}

message SubscribeFramesRequest {}

message GetStatusRequest {}
message StatusResponse {
  GrabberState    state          = 1;
  AcquisitionMode mode           = 2;
  int64           frames_grabbed = 3;
  string          message        = 4;
}

// ── Dynamic capabilities ──────────────────────────────────────────────────────

message GetCapabilitiesRequest {}

message ParameterDescriptor {
  string             key           = 1;
  string             display_name  = 2;
  ParameterValueType value_type    = 3;
  ParameterValue     min_value     = 4;
  ParameterValue     max_value     = 5;
  ParameterValue     default_value = 6;
}

message CommandDescriptor {
  string key          = 1;
  string display_name = 2;
  string description  = 3;
}

message CapabilitiesResponse {
  repeated ParameterDescriptor parameters = 1;
  repeated CommandDescriptor   commands   = 2;
}

// ── Parameter get / set ───────────────────────────────────────────────────────

message GetParameterRequest {
  string key = 1;
}
message GetParameterResponse {
  string         key   = 1;
  ParameterValue value = 2;
}

message SetParameterRequest {
  string         key   = 1;
  ParameterValue value = 2;
}
message SetParameterResponse {
  bool   success = 1;
  string message = 2;
}

// ── Command execution ─────────────────────────────────────────────────────────

message ExecuteCommandRequest {
  string command = 1;
}

message CommandResult {
  bool           success = 1;
  oneof return_value {
    int64  int_val    = 2;
    double double_val = 3;
    bool   bool_val   = 4;
    string string_val = 5;
  }
}

// ── Frame Handle (shared memory pointer) ─────────────────────────────────────

message FrameHandle {
  string      frame_id          = 1;
  string      shared_memory_key = 2;  // MMF 이름 (OpenExisting 키)
  int64       timestamp_us      = 3;
  int32       width             = 4;
  int32       height            = 5;
  PixelFormat pixel_format      = 6;
  int32       stride            = 7;
  int64       size_bytes        = 8;
  int32       slot_index        = 9;  // 링버퍼 슬롯 인덱스
  int64       sequence          = 10; // 단조 증가 시퀀스 (누락 감지용)
}
